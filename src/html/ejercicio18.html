<!--
18. Escribir una función llamada calcularMayor y pasarle como parámetros (numero1, 
numero2). Los números son ingresados por el usuario. Dentro de la función mostrar un 
mensaje que diga cuál de los números ingresados es mayor. En caso de ser iguales, 
tendrá que indicarlo con otro mensaje. 
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18</title>
</head>
<body>
    <script>
        function calcularMayor(numero1, numero2) {
            if (numero1 > numero2) {
                alert("El número " + numero1 + " es mayor que " + numero2);
            } else if (numero2 > numero1) {
                alert("El número " + numero2 + " es mayor que " + numero1);
            } else {
                alert("Los números son iguales");
            }
        }

        const numero1 = parseInt(prompt("Ingrese el primer número:"));
        const numero2 = parseInt(prompt("Ingrese el segundo número:"));

        calcularMayor(numero1, numero2);
    </script>
</body>
</html>
