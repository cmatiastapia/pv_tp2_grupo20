<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 20</title>
    <link rel="stylesheet" href="../../assets/css/ejercicio20.css">
</head>


<body>
    <main class="contenedor">
        <h1>Ingreso de Datos</h1>

        <form id="formulario">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="Ingrese solo letras" required pattern="[A-Za-z\s]+">

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" placeholder="Ingrese solo letras"  required pattern="[A-Za-z\s]+">

            <label for="libreta">Libreta Universitaria:</label>
            <input type="number" id="libreta"  placeholder="Ingrese solo numeros" required>

            <button type="submit" id="btnMostrar">Mostrar Datos</button>
        </form>

        <div id="resultado"></div>
    </main>

    <script type="module" src="../js/ejercicio20.js"></script>
</body>
